    # Zion Node — Remote Hub Configuration
# Usage:
#   1. cp config.example.toml config.toml
#   2. Edit config.toml with your Hub endpoint and settings
#   3. ./release/zion-node --config config.toml

# Node identity
node_id = "my-node-001"  # Choose a unique identifier for your node
# operator_address will be auto-loaded from wallet (~/.zion-node/wallet.json)

# Wallet directory (default: ~/.zion-node)
# Uncomment to override the default wallet location.
# Can also be set via --wallet-dir flag or WALLET_DIR env var.
# wallet_dir = "/path/to/wallet"

# Hub connection (remote Hub — REQUIRED: replace with your actual Hub endpoint)
hub_url = "https://hub.zion.example"  # ⚠️ CHANGE THIS to your Hub URL
# hub_public_key is automatically fetched from hub at startup (GET /v1/system/signing-key)

# Capacity
max_agents = 10
cpu_per_agent = 1
memory_per_agent = 1024  # MB
storage_per_agent = 1024  # MB

# Storage
data_dir = "./data"
snapshot_cache = "./cache"

# Container
container_engine = "docker"
runtime_image = "alpine/openclaw:main"

# Heartbeat
heartbeat_interval = 10  # seconds
heartbeat_retry_max = 3
heartbeat_retry_interval = 5  # seconds

# Snapshot
snapshot_retention_days = 3

# Logging
log_dir = "./logs"
log_level = "info"

# HTTP
http_timeout = 10  # seconds
