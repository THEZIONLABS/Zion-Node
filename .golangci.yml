linters-settings:
  errcheck:
    # Don't check test files for unchecked errors (test helper calls etc.)
    exclude-functions:
      - (io.Closer).Close
      - (*os/exec.Cmd).Run

linters:
  enable:
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - staticcheck
        - unused
