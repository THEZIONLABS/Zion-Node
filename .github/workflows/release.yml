name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./internal/... ./pkg/... -race -count=1 -timeout 180s

      - name: Build
        run: go build -o /dev/null ./cmd/zion-node

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify binary version
        run: |
          TAG="${{ github.ref_name }}"
          EXPECTED="${TAG#v}"
          ACTUAL=$(./dist/zion-node_linux_amd64_v1/zion-node version 2>&1 | awk '{print $NF}')
          if [[ "$ACTUAL" != "$EXPECTED" ]]; then
            echo "::error::Version mismatch: binary reports '$ACTUAL', expected '$EXPECTED'"
            exit 1
          fi
          echo "Version verified: $ACTUAL"
